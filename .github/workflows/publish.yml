# Description: Publishes the scryml distribution to PyPI when a GitHub Release is published.
# Description: Uses PyPI Trusted Publishing (OIDC); no API token is stored in the repo.

name: publish

on:
  # To auto-publish on every GitHub Release, configure a PyPI Trusted Publisher
  # (a pending publisher for this repo + workflow + the "pypi" environment), then
  # add back:
  #   release:
  #     types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
